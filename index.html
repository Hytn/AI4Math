<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>AI4Math — Formal Proof Agent Platform</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{margin:0;font-family:'IBM Plex Sans',-apple-system,sans-serif;background:#080a0f;color:#c4cad8}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:#080a0f}::-webkit-scrollbar-thumb{background:#1e2536;border-radius:3px}
@keyframes fs{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
@keyframes p{0%,100%{opacity:1}50%{opacity:.35}}
</style>
</head>
<body>
<div id="root"></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.3.1/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.3.1/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.26.9/babel.min.js"></script>
<script type="text/babel">
const{useState,useRef}=React;
const S={bg:"#080a0f",sf:"#0f1218",sf2:"#161b24",bd:"#1e2536",tx:"#c4cad8",dm:"#5c6680",ac:"#3b82f6",acBg:"rgba(59,130,246,.12)",gn:"#10b981",gnBg:"rgba(16,185,129,.1)",rd:"#ef4444",rdBg:"rgba(239,68,68,.08)",am:"#f59e0b",amBg:"rgba(245,158,11,.1)",mn:"'IBM Plex Mono',Menlo,monospace",sn:"'IBM Plex Sans',-apple-system,sans-serif"};

const PROBLEMS=[
  {id:"amgm",name:"AM-GM inequality",stmt:"theorem amgm_two (a b : ℝ)\n  (ha : 0 ≤ a) (hb : 0 ≤ b) :\n  a * b ≤ (a + b) ^ 2 / 4",nl:"Prove ab ≤ ((a+b)/2)² for non-negative reals",diff:"medium",tags:["algebra","inequality"]},
  {id:"comm",name:"Addition commutativity",stmt:"theorem nat_add_comm\n  (a b : Nat) : a + b = b + a",nl:"Prove natural number addition is commutative",diff:"easy",tags:["arithmetic"]},
  {id:"gauss",name:"Gauss summation",stmt:"theorem sum_first_n (n : Nat) :\n  2 * (Finset.range (n+1)).sum id\n  = n * (n + 1)",nl:"Prove 2·(0+1+…+n) = n(n+1)",diff:"medium",tags:["algebra","induction"]}
];

const TRACES={
  amgm:{solved:true,tokens:6840,ms:24600,proof:":= by\n  ring_nf\n  nlinarith [sq_nonneg (a - b)]",rounds:[
    {n:1,samples:[
      {id:1,ok:false,proof:":= by\n  nlinarith",tok:320,lm:1400,ln:3200,errs:[{c:"tactic_failed",m:"nlinarith failed to prove the goal",l:5}]},
      {id:2,ok:false,proof:":= by\n  simp [mul_comm]\n  ring",tok:380,lm:1600,ln:2800,errs:[{c:"tactic_failed",m:"simp made no progress",l:5}]},
      {id:3,ok:false,proof:":= by\n  have h := sq_nonneg (a - b)\n  linarith",tok:410,lm:1500,ln:3100,errs:[{c:"type_mismatch",m:"linarith failed on nonlinear arithmetic",l:6}]},
      {id:4,ok:false,proof:":= by\n  positivity",tok:290,lm:1200,ln:2600,errs:[{c:"tactic_failed",m:"positivity failed: not a positivity goal",l:5}]}
    ],lemmas:[]},
    {n:2,samples:[
      {id:5,ok:false,proof:":= by\n  have h : 0 ≤ (a-b)^2 := sq_nonneg _\n  nlinarith [h]",tok:520,lm:1800,ln:3400,errs:[{c:"elaboration_error",m:"failed to synthesize instance",l:6}]},
      {id:6,ok:false,proof:":= by\n  nlinarith [sq_nonneg (a-b), sq_nonneg (a+b)]",tok:480,lm:1700,ln:3600,errs:[{c:"tactic_failed",m:"nlinarith failed with extra hypotheses",l:5}]},
      {id:7,ok:true,proof:":= by\n  ring_nf\n  nlinarith [sq_nonneg (a - b)]",tok:460,lm:1900,ln:2900,errs:[]},
      {id:8,ok:false,proof:":= by\n  have := mul_self_nonneg (a-b)\n  ring_nf at this ⊢\n  linarith",tok:540,lm:2100,ln:3200,errs:[{c:"unknown_identifier",m:"unknown identifier 'mul_self_nonneg'",l:5}]}
    ],lemmas:["sq_nonneg_sub : ∀ x y, 0 ≤ (x - y) ^ 2"]}
  ]},
  comm:{solved:true,tokens:1240,ms:8200,proof:":= by omega",rounds:[
    {n:1,samples:[
      {id:1,ok:true,proof:":= by omega",tok:180,lm:800,ln:1600,errs:[]},
      {id:2,ok:true,proof:":= Nat.add_comm a b",tok:160,lm:700,ln:1400,errs:[]},
      {id:3,ok:true,proof:":= by\n  induction a with\n  | zero => simp\n  | succ n ih => simp [Nat.succ_add, ih]",tok:420,lm:1200,ln:2200,errs:[]},
      {id:4,ok:false,proof:":= by ring",tok:140,lm:600,ln:1800,errs:[{c:"tactic_failed",m:"ring failed: Nat is not a ring",l:4}]}
    ],lemmas:[]}
  ]},
  gauss:{solved:true,tokens:9400,ms:38200,proof:":= by\n  induction n with\n  | zero => simp\n  | succ n ih =>\n    simp [Finset.sum_range_succ]\n    omega",rounds:[
    {n:1,samples:[
      {id:1,ok:false,proof:":= by\n  simp [Finset.sum_range_succ]\n  ring",tok:380,lm:1400,ln:3800,errs:[{c:"tactic_failed",m:"ring failed to close the goal",l:6}]},
      {id:2,ok:false,proof:":= by omega",tok:220,lm:900,ln:4200,errs:[{c:"tactic_failed",m:"omega failed on Finset.sum",l:4}]},
      {id:3,ok:false,proof:":= by\n  induction n with\n  | zero => simp\n  | succ n ih => sorry",tok:480,lm:1600,ln:2200,errs:[{c:"other",m:"declaration uses sorry",l:7}]},
      {id:4,ok:false,proof:":= by\n  induction n with\n  | zero => simp\n  | succ n ih =>\n    simp [Finset.sum_range_succ]\n    linarith",tok:520,lm:1800,ln:4100,errs:[{c:"tactic_failed",m:"linarith failed: nonlinear",l:8}]}
    ],lemmas:[]},
    {n:2,samples:[
      {id:5,ok:false,proof:":= by\n  induction n with\n  | zero => simp\n  | succ n ih =>\n    simp [Finset.sum_range_succ]\n    ring_nf; linarith",tok:680,lm:2200,ln:4400,errs:[{c:"tactic_failed",m:"linarith failed after ring_nf",l:9}]},
      {id:6,ok:true,proof:":= by\n  induction n with\n  | zero => simp\n  | succ n ih =>\n    simp [Finset.sum_range_succ]\n    omega",tok:620,lm:2000,ln:3600,errs:[]},
      {id:7,ok:false,proof:":= by\n  induction n with\n  | zero => norm_num\n  | succ n ih =>\n    rw [Finset.sum_range_succ]\n    push_cast; linarith",tok:740,lm:2400,ln:4600,errs:[{c:"type_mismatch",m:"type mismatch in push_cast",l:8}]},
      {id:8,ok:false,proof:":= by\n  induction n with\n  | zero => simp\n  | succ n ih =>\n    simp only [Finset.sum_range_succ, id]\n    ring_nf; omega",tok:710,lm:2300,ln:4100,errs:[{c:"tactic_failed",m:"omega failed on nonlinear",l:9}]}
    ],lemmas:["sum_range_succ_unfold"]}
  ]}
};

function Badge({ok,label}){const c=ok?S.gn:S.rd;return <span style={{display:"inline-block",padding:"2px 9px",borderRadius:4,fontSize:11,fontWeight:600,fontFamily:S.mn,background:ok?S.gnBg:S.rdBg,color:c,letterSpacing:".03em"}}>{label||(ok?"PROVED":"FAILED")}</span>}

function SampleRow({s,open,toggle}){
  return(<div style={{marginBottom:3}}>
    <div onClick={toggle} style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"7px 12px",borderRadius:6,border:`1px solid ${s.ok?S.gn+"30":S.bd}`,background:s.ok?S.gnBg:"transparent",cursor:"pointer",transition:"background .1s"}}>
      <div style={{display:"flex",alignItems:"center",gap:8}}>
        <span style={{fontFamily:S.mn,fontSize:11,color:S.dm,width:20}}>S{s.id}</span>
        <Badge ok={s.ok}/>
      </div>
      <div style={{display:"flex",gap:12,fontSize:11,fontFamily:S.mn,color:S.dm}}>
        <span>{s.lm}ms llm</span><span>{s.ln}ms lean</span><span>{s.tok} tok</span>
        <span style={{transition:"transform .15s",transform:open?"rotate(180deg)":""}}>▾</span>
      </div>
    </div>
    {open&&<div style={{padding:"6px 12px 10px 32px",animation:"fs .2s ease"}}>
      <div style={{marginTop:4}}>
        <div style={{fontSize:10,fontFamily:S.mn,color:S.dm,textTransform:"uppercase",letterSpacing:".06em",marginBottom:2}}>generated proof</div>
        <pre style={{background:S.bg,border:`1px solid ${S.bd}`,borderRadius:6,padding:"8px 12px",fontSize:12,fontFamily:S.mn,color:S.tx,margin:0,lineHeight:1.55,whiteSpace:"pre-wrap"}}>{s.proof}</pre>
      </div>
      {s.errs.length>0&&<div style={{marginTop:6}}>{s.errs.map((e,i)=><div key={i} style={{background:S.rdBg,border:`1px solid ${S.rd}18`,borderRadius:4,padding:"4px 10px",fontSize:11,fontFamily:S.mn,color:S.rd,marginBottom:2}}><span style={{opacity:.55}}>[{e.c}]</span> {e.l&&<span style={{opacity:.55}}>L{e.l} </span>}{e.m}</div>)}</div>}
    </div>}
  </div>);
}

function App(){
  const[sel,setSel]=useState(null);
  const[vis,setVis]=useState([]);
  const[trace,setTrace]=useState(null);
  const[running,setRunning]=useState(false);
  const[phase,setPhase]=useState("");
  const[opens,setOpens]=useState({});
  const timer=useRef(null);

  const pick=(p)=>{setSel(p);setTrace(null);setVis([]);setRunning(false);setPhase("");setOpens({});if(timer.current)clearTimeout(timer.current);};

  const run=()=>{
    if(!sel||running)return;
    const t=TRACES[sel.id];if(!t)return;
    setRunning(true);setTrace(null);setVis([]);setOpens({});setPhase("premise");
    let step=0;const rounds=t.rounds;
    const go=()=>{
      if(step===0){setPhase("sampling");timer.current=setTimeout(go,900);}
      else if(step<=rounds.length){
        const shown=rounds.slice(0,step);setVis(shown);
        const rd=rounds[step-1];const ok=rd.samples.some(s=>s.ok);
        if(ok||step>=rounds.length){setTrace(t);setPhase("done");setRunning(false);return;}
        setPhase("banking");
        timer.current=setTimeout(()=>{setPhase("sampling");timer.current=setTimeout(go,1200+Math.random()*800);},1000);
      }
      step++;
    };
    timer.current=setTimeout(go,700);
  };

  const allS=vis.flatMap(r=>r.samples);const nOk=allS.filter(s=>s.ok).length;

  return(
  <div style={{minHeight:"100vh",background:S.bg,color:S.tx,fontFamily:S.sn}}>
    <header style={{borderBottom:`1px solid ${S.bd}`,padding:"13px 24px",display:"flex",alignItems:"center",justifyContent:"space-between"}}>
      <div style={{display:"flex",alignItems:"baseline",gap:10}}>
        <span style={{fontSize:17,fontWeight:600,fontFamily:S.mn}}>AI4Math</span>
        <span style={{fontSize:11.5,color:S.dm,fontFamily:S.mn}}>Formal proof agent · Parallel rollout</span>
      </div>
      <div style={{fontSize:11,fontFamily:S.mn,color:S.dm}}>Lean 4 + Mathlib · kernel-verified</div>
    </header>

    <div style={{display:"flex",minHeight:"calc(100vh - 48px)"}}>
      <aside style={{width:290,borderRight:`1px solid ${S.bd}`,flexShrink:0,overflowY:"auto"}}>
        <div style={{padding:"11px 14px 7px",fontSize:10,fontFamily:S.mn,color:S.dm,textTransform:"uppercase",letterSpacing:".07em",borderBottom:`1px solid ${S.bd}`}}>Problems</div>
        {PROBLEMS.map(p=><div key={p.id} onClick={()=>pick(p)} style={{padding:"11px 14px",borderBottom:`1px solid ${S.bd}`,cursor:"pointer",background:sel?.id===p.id?S.sf2:"transparent"}}>
          <div style={{fontFamily:S.mn,fontSize:12.5,fontWeight:500}}>{p.name}</div>
          <div style={{fontSize:11.5,color:S.dm,marginTop:2,lineHeight:1.35}}>{p.nl}</div>
          <div style={{marginTop:5,display:"flex",gap:3}}>
            <span style={{fontSize:9.5,fontFamily:S.mn,padding:"1px 6px",borderRadius:3,background:p.diff==="easy"?S.gnBg:S.amBg,color:p.diff==="easy"?S.gn:S.am}}>{p.diff}</span>
            {p.tags.map(t=><span key={t} style={{fontSize:9.5,fontFamily:S.mn,padding:"1px 6px",borderRadius:3,background:S.sf2,color:S.dm}}>{t}</span>)}
          </div>
        </div>)}
        <div style={{padding:"14px",borderTop:`1px solid ${S.bd}`,fontSize:10,fontFamily:S.mn,color:S.dm,lineHeight:1.65}}>
          <span style={{color:S.tx,fontWeight:500}}>How it works</span><br/>
          Each round fires N parallel proofs at the Lean kernel. Proven lemmas from failed attempts are banked and injected into subsequent rounds.
        </div>
      </aside>

      <main style={{flex:1,overflowY:"auto",padding:"22px 28px"}}>
        {!sel?<div style={{display:"flex",alignItems:"center",justifyContent:"center",height:"60vh",flexDirection:"column",gap:10}}>
          <div style={{fontSize:48,opacity:.07,fontFamily:S.mn}}>∀ x, ∃ proof</div>
          <div style={{fontFamily:S.mn,color:S.dm,fontSize:12.5}}>Select a problem to begin</div>
        </div>:<>
          <div style={{marginBottom:18}}>
            <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:4}}>
              <h2 style={{fontFamily:S.mn,fontSize:14.5,fontWeight:600,margin:0}}>{sel.name}</h2>
              {trace&&<Badge ok={trace.solved}/>}
            </div>
            <p style={{fontSize:12.5,color:S.dm,margin:"0 0 8px"}}>{sel.nl}</p>
            <pre style={{background:S.bg,border:`1px solid ${S.bd}`,borderRadius:6,padding:"10px 14px",fontSize:12.5,fontFamily:S.mn,color:S.tx,margin:0,lineHeight:1.55,whiteSpace:"pre-wrap"}}>{sel.stmt}</pre>
          </div>

          <button onClick={run} disabled={running} style={{fontFamily:S.mn,fontSize:12.5,fontWeight:600,padding:"9px 24px",borderRadius:6,border:"none",background:running?S.bd:S.ac,color:running?S.dm:"#fff",cursor:running?"not-allowed":"pointer",marginBottom:18}}>
            {running?"Agent working...":"Run proof agent"}
          </button>

          {running&&<div style={{fontFamily:S.mn,fontSize:12,color:S.ac,marginBottom:14,animation:"p 1.5s infinite"}}>
            {phase==="premise"?"Retrieving premises from Mathlib...":phase==="sampling"?"Sampling parallel proofs → Lean kernel...":"Extracting lemmas → banking experience..."}
          </div>}

          {(trace||vis.length>0)&&<div style={{display:"grid",gridTemplateColumns:"repeat(5,minmax(0,1fr))",gap:1,borderRadius:8,overflow:"hidden",border:`1px solid ${S.bd}`,marginBottom:18}}>
            {[["Rounds",vis.length],["Samples",allS.length],["Proved",nOk],["Tokens",trace?trace.tokens.toLocaleString():"..."],["Cost",trace?`$${(trace.tokens*3/1e6).toFixed(3)}`:"..."]].map(([l,v])=>
              <div key={l} style={{background:S.sf,textAlign:"center",padding:"9px 6px"}}>
                <div style={{fontSize:10,fontFamily:S.mn,color:S.dm,textTransform:"uppercase",letterSpacing:".05em"}}>{l}</div>
                <div style={{fontSize:18,fontWeight:600,fontFamily:S.mn,color:l==="Proved"&&nOk>0?S.gn:S.tx,marginTop:1}}>{v}</div>
              </div>)}
          </div>}

          {trace?.solved&&<div style={{marginBottom:18,padding:"12px 14px",borderRadius:8,border:`1px solid ${S.gn}30`,background:S.gnBg,animation:"fs .3s ease"}}>
            <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:6}}>
              <span style={{width:7,height:7,borderRadius:"50%",background:S.gn}}/>
              <span style={{fontFamily:S.mn,fontSize:11,fontWeight:600,color:S.gn,letterSpacing:".04em"}}>LEAN KERNEL VERIFIED</span>
            </div>
            <pre style={{background:S.bg,border:`1px solid ${S.bd}`,borderRadius:6,padding:"8px 12px",fontSize:12.5,fontFamily:S.mn,color:S.tx,margin:0,lineHeight:1.55,whiteSpace:"pre-wrap"}}>{trace.proof}</pre>
          </div>}

          {vis.length>0&&<div>
            <div style={{fontSize:10,fontFamily:S.mn,color:S.dm,textTransform:"uppercase",letterSpacing:".07em",marginBottom:10}}>Rollout rounds · click samples to inspect</div>
            {vis.map((rd,ri)=><div key={rd.n} style={{marginBottom:14,animation:"fs .3s ease",animationDelay:`${ri*.1}s`,animationFillMode:"both"}}>
              <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:6}}>
                <div style={{display:"flex",alignItems:"center",gap:7}}>
                  <div style={{width:22,height:22,borderRadius:"50%",background:S.acBg,display:"flex",alignItems:"center",justifyContent:"center",fontSize:10.5,fontWeight:600,fontFamily:S.mn,color:S.ac}}>{rd.n}</div>
                  <span style={{fontFamily:S.mn,fontSize:12.5,fontWeight:500}}>Round {rd.n}</span>
                  <span style={{fontFamily:S.mn,fontSize:11,color:S.dm}}>{rd.samples.length} parallel</span>
                </div>
                <div style={{fontSize:11,fontFamily:S.mn}}>
                  {rd.samples.filter(s=>s.ok).length>0&&<span style={{color:S.gn,marginRight:8}}>{rd.samples.filter(s=>s.ok).length} passed</span>}
                  <span style={{color:S.dm}}>{rd.samples.filter(s=>!s.ok).length} failed</span>
                </div>
              </div>
              {rd.samples.map(s=><SampleRow key={s.id} s={s} open={!!opens[s.id]} toggle={()=>setOpens(p=>({...p,[s.id]:!p[s.id]}))}/>)}
              {rd.lemmas.length>0&&<div style={{marginTop:6,padding:"6px 11px",borderRadius:6,background:S.amBg,border:`1px solid ${S.am}18`}}>
                <div style={{fontSize:9.5,fontFamily:S.mn,color:S.am,textTransform:"uppercase",letterSpacing:".06em",marginBottom:1}}>Banked lemmas → shared to next round</div>
                {rd.lemmas.map((l,i)=><div key={i} style={{fontSize:11.5,fontFamily:S.mn,color:S.am,opacity:.85}}>{l}</div>)}
              </div>}
            </div>)}
            {running&&<div style={{fontFamily:S.mn,fontSize:12,color:S.dm,animation:"p 1.5s infinite"}}>Preparing next round...</div>}
          </div>}
        </>}
      </main>
    </div>
  </div>);
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
