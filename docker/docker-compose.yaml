version: "3.8"
services:
  lean:
    build:
      context: .
      dockerfile: Dockerfile.lean
    container_name: ai4math-lean
    volumes:
      - lean-cache:/workspace/lean-project/.lake
      - lean-exchange:/workspace/exchange
    restart: unless-stopped
    environment:
      - LEAN_SOCKET=/workspace/exchange/lean.sock
      - LEAN_PROJECT_DIR=/workspace/lean-project
      - LEAN_MAX_CONCURRENT=8
      - LEAN_TIMEOUT=120
    command: ["python3", "/workspace/lean_daemon.py"]
    healthcheck:
      test: >-
        python3 -c "
        import socket, json;
        s = socket.socket(socket.AF_UNIX, socket.SOCK_STREAM);
        s.connect('/workspace/exchange/lean.sock');
        s.sendall(json.dumps({'cmd': '#check Nat', 'env': 0, 'id': 'hc'}).encode() + b'\n');
        data = s.recv(4096);
        r = json.loads(data);
        exit(0 if 'result' in r else 1)
        "
      interval: 30s
      timeout: 15s
      start_period: 120s
      retries: 3

  agent:
    build:
      context: ..
      dockerfile: docker/Dockerfile.agent
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - LEAN_VERIFY_MODE=socket
      - LEAN_SOCKET=/workspace/exchange/lean.sock
    volumes:
      - lean-exchange:/workspace/exchange
    depends_on:
      lean:
        condition: service_healthy

volumes:
  lean-cache:
  lean-exchange:
