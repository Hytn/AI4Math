# AI4Math — Default Configuration

agent:
  brain:
    provider: "anthropic"
    model: "claude-sonnet-4-20250514"
    api_key: ""
    max_tokens: 8192
    extended_thinking: false
  memory:
    working_memory_max_items: 20
    episodic_memory_enabled: false
  context:
    max_context_tokens: 100000
    compression_threshold: 0.7
  strategy:
    default: "adaptive"
    max_light_rounds: 2
    max_medium_rounds: 4
    reflection_interval: 3

prover:
  pipeline:
    samples_per_round: 8
    max_rounds: 4
    max_workers: 4
    temperature: 0.9
    max_samples: 128
  sketch:
    enabled: true
    max_hypotheses: 3
  premise:
    mode: "hybrid"
    top_k: 10
    bm25_k1: 1.5
    bm25_b: 0.75
  codegen:
    auto_import: true
    scaffold_enabled: true
  verifier:
    mode: "docker"
    docker_image: "ai4math-lean"
    docker_container: ""
    lean_project_dir: "/workspace/lean-project"
    timeout_seconds: 120
  repair:
    enabled: true
    max_cycles: 3
  lemma_bank:
    enabled: true
    verify_extracted: false
    max_banked: 10
  conjecture:
    enabled: false
  decompose:
    enabled: true
    max_depth: 3

benchmark:
  name: "builtin"
  path: ""
  split: "test"

output:
  dir: "results"

server:
  host: "0.0.0.0"
  port: 8000

engine:
  lean_pool_size: 4
  max_wall_seconds: 3600
  pipeline_queue_size: 16
  num_verifiers: 4
  pool_scaler:
    min_sessions: 1
    max_sessions: 16
    scale_up_threshold: 0.8
    scale_down_threshold: 0.3
    cooldown_seconds: 10.0
