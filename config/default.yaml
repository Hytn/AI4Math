# AI4Math — Default Configuration

agent:
  brain:
    provider: "anthropic"
    model: "claude-sonnet-4-20250514"
    api_key: ""
    max_tokens: 8192
    extended_thinking: false
  memory:
    working_memory_max_items: 20
    episodic_memory_enabled: false
  context:
    max_context_tokens: 100000
    compression_threshold: 0.7
  strategy:
    default: "adaptive"
    max_light_rounds: 2
    max_medium_rounds: 4

prover:
  pipeline:
    samples_per_round: 8
    max_rounds: 4
    max_workers: 4
    temperature: 0.9
    max_samples: 128
    # 异构并行方向配置
    # 每个方向定义独立的模型、温度、角色和策略提示
    # 可通过实验 YAML 覆盖 (如 config/experiments/xxx.yaml)
    directions:
      - name: "automation"
        role: "proof_generator"
        model: "claude-sonnet-4-20250514"
        temperature: 0.2
        strategic_hint: >
          Try to solve this with simple automation ONLY.
          Attempt these tactics in order: decide, norm_num, simp,
          omega, ring, aesop. If a single tactic doesn't work,
          try 'simp; ring' or 'simp; omega'.
          Do NOT attempt induction or complex proof structures.
      - name: "structured"
        role: "proof_generator"
        model: "claude-sonnet-4-20250514"
        temperature: 0.7
        strategic_hint: >
          Plan the proof structure carefully.
          Use `have` statements with explicit types for intermediate steps.
      - name: "alternative"
        role: "proof_planner"
        model: "claude-sonnet-4-20250514"
        temperature: 0.9
        strategic_hint: >
          Try a fundamentally DIFFERENT approach from standard methods.
          Consider: casting to ℤ if working with ℕ,
          using `conv` to restructure goals,
          or finding a non-obvious Mathlib lemma that solves it directly.
    # 以下方向仅在有失败历史时自动启用
    repair_direction:
      name: "repair_rethink"
      role: "critic"
      model: "claude-sonnet-4-20250514"
      temperature: 0.5
      min_failures: 2
  sketch:
    enabled: true
    max_hypotheses: 3
  premise:
    mode: "hybrid"
    top_k: 10
    bm25_k1: 1.5
    bm25_b: 0.75
  codegen:
    auto_import: true
    scaffold_enabled: true
  verifier:
    mode: "docker"
    docker_image: "ai4math-lean"
    docker_container: ""
    lean_project_dir: "/workspace/lean-project"
    timeout_seconds: 120
  repair:
    enabled: true
    max_cycles: 3
  lemma_bank:
    enabled: true
    verify_extracted: false
    max_banked: 10
  conjecture:
    enabled: false
  decompose:
    enabled: true
    max_depth: 3

benchmark:
  name: "builtin"
  path: ""
  split: "test"

output:
  dir: "results"

server:
  host: "0.0.0.0"
  port: 8000
