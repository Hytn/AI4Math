# AI4Math — Default Configuration (v13)
#
# v13 注: 之前的 default.yaml 列了 7 个 section、~30 个字段, 但 run_unified.py
# 实际只读 2 个 (lean_pool_size, prover.premise.mode), 其余 80% 是装饰用。
# v13 砍到只剩有消费方的字段 + 一段 RL infra defaults (vllm/slime 接入用)。
#
# Override priority (highest → lowest):
#   1. CLI flags (--pool-size / --profile / ...)
#   2. Environment variables (AI4MATH_ENGINE__LEAN_POOL_SIZE=8 → engine.lean_pool_size=8)
#   3. This file
#
# To use a different config file: pass --config path/to/your.yaml.

agent:
  brain:
    # 仅供 run_eval.py / run_unified.py 启动时打印.
    # 真正生效的 model 由 --model 参数 + AI4MATH_DEFAULT_MODEL 环境变量决定.
    provider: "anthropic"           # anthropic | mock
    model: ""                       # empty → fall back to common.constants.DEFAULT_CLAUDE_MODEL

prover:
  premise:
    mode: "hybrid"                  # bm25 | embedding | hybrid | none
    top_k: 10

engine:
  lean_pool_size: 4                 # AsyncLeanPool 并发会话数
