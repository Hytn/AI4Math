[pytest]
asyncio_mode = auto
testpaths = tests
norecursedirs = scripts data results .venv venv build dist

# v15: registered markers. Without this section pytest emits
# PytestUnknownMarkWarning for every @pytest.mark.live and the warning
# noise hides real ones. Run live tests with:
#     pytest -m live
# Skip live tests in mock-only CI:
#     pytest -m "not live"
markers =
    live: real-LLM-API integration tests; need ANTHROPIC_API_KEY (or DEEPSEEK_API_KEY etc.) to run; pytest skips by default
    lean: real Lean 4 toolchain integration tests; need a working Mathlib build to run
    slow: takes >5s; OK to skip in fast pre-commit loop
